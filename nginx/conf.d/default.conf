# Redirige todo el tráfico HTTP (8080 exterior) a HTTPS (8443 exterior)
server {
    listen 80;
    server_name localhost;
    return 301 https://localhost:8443$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/nginx.crt;
    ssl_certificate_key /etc/nginx/certs/nginx.key;

    # API REST: todo lo que empiece por /api va al backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO): requiere cabeceras de Upgrade/Connection
    # para que la conexión HTTP se transforme en una conexión WebSocket persistente
    location /socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Los WebSockets son conexiones de larga duración: sin esto,
        # nginx cierra la conexión tras el timeout por defecto (60s)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Todo lo demás: servidor de desarrollo de Vite (frontend)
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario para el Hot Module Replacement (HMR) de Vite:
        # el HMR también usa WebSocket internamente
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
